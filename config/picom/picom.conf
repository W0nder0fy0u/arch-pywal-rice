backend = "xrender";
vsync = false;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;

active-opacity = 0.95;
inactive-opacity = 0.85;
frame-opacity = 0.85;

opacity-rule = [
  "70:class_g = 'feh'",
  "70:class_g = 'mpv'",
  "70:class_g = 'vlc'",
  "70:class_g = 'terminator'",
  "70:class_g = 'Alacritty'",
  "70:class_g = 'kitty'",
  "90:class_g = 'Brave-browser'",
  "80:class_g = 'firefox'",
  "70:class_g = 'Google-chrome'",
  "70:class_g = 'code-oss'",
  "70:class_g = 'Thunar'",
  "70:class_g = 'Nautilus'",
  "70:class_g = 'Spotify'",
  "70:class_g = 'TelegramDesktop'",
  "70:class_g = 'Zoom'",
  "70:class_g = 'qBittorrent'",
  "70:class_g = 'Zathura'",
  "70:class_g = 'Rofi'",
  "70:class_g = 'pavucontrol'",
  "70:class_g = 'Blueman-manager'",
  "70:class_g = 'Nvidia-settings'",
  "70:class_g = 'VirtualBox Manager'"
];

blur-method = "dual_kawase";
blur-strength = 5;
blur-background = true;
blur-background-exclude = [
  "class_g = 'feh'",
  "class_g = 'mpv'",
  "class_g = 'vlc'",
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

shadow = true;
shadow-radius = 12;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity = 0.5;
shadow-exclude = [
  "class_g = 'i3-frame'",
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

# High contrast - increase brightness and saturation
inactive-dim = 0.2;
inactive-dim-fixed = true;

# High contrast - increase brightness and saturation
inactive-dim = 0.6;
inactive-dim-fixed = true;

# High contrast - increase brightness and saturation
inactive-dim = 0.1;
inactive-dim-fixed = true;

# High contrast - increase brightness and saturation
inactive-dim = 0.1;

# Color correction for high contrast
#brightness-adjust = 0.1;
#saturation-adjust = 0.2;
#contrast-adjust = 0.1;

# High contrast - increase brightness and saturation
#inactive-dim = 0.1;

# Color correction for high contrast
brightness-adjust = 0.5;
saturation-adjust = 0.5;
contrast-adjust = 0.5;

# High contrast - increase brightness and saturation
inactive-dim = 0.1;

# Color correction for high contrast
brightness-adjust = 0.10;
saturation-adjust = 0.10;
contrast-adjust = 0.10;
